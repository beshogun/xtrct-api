# Railway deployment — uses Dockerfile directly.
# For local development with FlareSolverr, use docker-compose.yml instead:
#   docker compose up
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bun src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "api"

[[services]]
name = "flaresolverr"
image = "ghcr.io/flaresolverr/flaresolverr:latest"
